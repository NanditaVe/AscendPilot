<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFOS Automation Hub | Lead Management Console</title>
<style>
  :root {
    --primary-deep: #2aaab3;
    --border: #d8ecee;
    --white: #ffffff;
    --text-dark: #1f2d2f;
    --text-light: #6b7d7f;
    --bg-light: #f3fafb;
    --hot-bg: #fff5f5;
    --hot-text: #e03131;
    --warm-bg: #fff9db;
    --warm-text: #f08c00;
    --cold-bg: #f1f3f5;
    --cold-text: #495057;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  body { background-color: #fafefe; color: var(--text-dark); padding: 30px; }
  .panel-container { max-width: 1500px; margin: 0 auto; }

  /* Back Control and Meta Information Navigation Strip Component */
  .control-strip { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
  .btn-back-hub { display: inline-block; padding: 10px 20px; background: #e2f4f5; color: var(--text-dark); border: none; border-radius: 8px; font-weight: 700; text-decoration: none; cursor: pointer; transition: 0.2s; font-size: 13.5px; }
  .btn-back-hub:hover { background: var(--border); }

  /* Filter Optimization Selection Layer Card Layout */
  .filter-bar-card {
    background: var(--white); border: 1.5px solid var(--border); border-radius: 16px;
    padding: 20px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
    box-shadow: 0 4px 15px rgba(0,0,0,0.01); margin-bottom: 25px;
  }
  .filter-field { display: flex; flex-direction: column; gap: 6px; }
  .filter-field label { font-size: 12.5px; font-weight: 700; color: var(--text-light); }
  .filter-field input, .filter-field select { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; outline: none; font-size: 13.5px; min-width: 200px; background: var(--bg-light); }
  .filter-field input:focus, .filter-field select:focus { border-color: var(--primary-deep); background: white; }

  /* High Performance Table Matrix Layout Container */
  .table-box-container {
    background: var(--white); border: 1.5px solid var(--border); border-radius: 20px;
    overflow: hidden; box-shadow: 0 10px 30px rgba(184, 234, 237, 0.1);
  }
  .data-matrix-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
  .data-matrix-table th { background: #f4fcfc; padding: 16px 20px; font-weight: 700; color: var(--text-dark); border-bottom: 2px solid var(--border); }
  .data-matrix-table td { padding: 16px 20px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .data-matrix-table tr:hover { background-color: #fafefe; }

  /* Interactive Operational Action Tags Component Styles */
  .badge-tag { padding: 5px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 700; display: inline-block; text-transform: uppercase; }
  .badge-hot { background: var(--hot-bg); color: var(--hot-text); border: 1px solid #ffc9c9; }
  .badge-warm { background: var(--warm-bg); color: var(--warm-text); border: 1px solid #ffe3e3; }
  .badge-cold { background: var(--cold-bg); color: var(--cold-text); border: 1px solid #dee2e6; }
  
  .btn-action-trigger { padding: 8px 14px; background: var(--primary-deep); color: white; border: none; border-radius: 6px; font-weight: 700; font-size: 12.5px; cursor: pointer; transition: 0.2s; }
  .btn-action-trigger:hover { opacity: 0.9; }

  /* AI Integration Prompt Overlay Container Styles */
  .modal-shade { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); z-index: 9999; align-items: center; justify-content: center; }
  .modal-shade.active { display: flex; }
  .modal-sheet-box { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); border: 1.5px solid var(--border); }
  .modal-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title-row h3 { font-size: 18px; font-weight: 800; }
  .modal-close-cross { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-light); }
  .modal-content-area textarea { width: 100%; height: 140px; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; resize: none; outline: none; font-size: 13.5px; background: var(--bg-light); line-height: 1.5; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="panel-container">
  
  <div class="control-strip">
    <a href="/admin/dashboard" class="btn-back-hub">← Back to Central Desk</a>
    <h2 style="font-size:22px; font-weight:800;">AI Qualification Workspace Matrix</h2>
  </div>

  <!-- Phase 2 Multi-Functional Filtering Layer Control Array Component -->
  <div class="filter-bar-card">
    <div class="filter-field">
      <label>Search Lead Profile</label>
      <input type="text" id="matrixSearchInput" onkeyup="executeClientSideFilters()" placeholder="Search by name, phone or qualifications...">
    </div>
    <div class="filter-field">
      <label>Filter Prospect Category</label>
      <select id="matrixCategorySelector" onchange="executeClientSideFilters()">
        <option value="ALL">-- View All System Profiles --</option>
        <option value="HOT">🔥 HOT LEADS ONLY</option>
        <option value="WARM">⚡ WARM LEADS ONLY</option>
        <option value="COLD">❄️ COLD LEADS ONLY</option>
      </select>
    </div>
  </div>

  <!-- Active Lead Records Grid System Console Platform Container Component -->
  <div class="table-box-container">
    <table class="data-matrix-table" id="leadsDataMatrixTable">
      <thead>
        <tr>
          <th>Lead Info</th>
          <th>Academics Level</th>
          <th>Lead Source</th>
          <th>Course Interest</th>
          <th>AI Quality Score</th>
          <th>Prospect Level</th>
          <th>Core Actions</th>
        </tr>
      </thead>
      <tbody id="leadsMatrixTableBody">
        <!-- Telemetry lists loaded dynamically using fetch functions scripts mapping framework below -->
      </tbody>
    </table>
  </div>

</div>

<!-- Phase 4 AI Personalization Telemetry Preview Panel System Overlay Component -->
<div class="modal-shade" id="aiMessagingModalBox">
  <div class="modal-sheet-box">
    <div class="modal-title-row">
      <h3>🤖 Generated Custom Personalization Script</h3>
      <button class="modal-close-cross" onclick="closeMessagingConsole()">&times;</button>
    </div>
    <div class="modal-content-area">
      <p style="font-size:12px; color:var(--text-light); margin-bottom:8px; font-weight:600;">WHATSAPP TEXT LAYOUT (UNDER 80 WORDS THRESHOLD CRITERIA):</p>
      <textarea id="aiMessageTextAreaContainer" readonly></textarea>
      <div style="display:flex; gap:12px;">
        <button class="btn-action-trigger" style="flex:2;" onclick="dispatchAutomatedNurtureSequence()">Dispatch via Automated Pipeline (n8n/Zapier Hook) 🚀</button>
        <button class="btn-back-hub" style="flex:1; margin:0;" onclick="closeMessagingConsole()">Close View</button>
      </div>
    </div>
  </div>
</div>

<script>
  let activeSystemLeadsCollection = [];

  function fetchSystemLeadsTelemetry() {
    fetch('/api/admin/fetch-leads')
      .then(res => res.json())
      .then(data => {
        if(data.success) {
          activeSystemLeadsCollection = data.leads;
          renderSystemLeadsMatrixRows(activeSystemLeadsCollection);
          
          // Check for incoming query params mapping routing options
          const urlParams = new URLSearchParams(window.location.search);
          if(urlParams.get('filter') === 'hot') {
            document.getElementById('matrixCategorySelector').value = 'HOT';
            executeClientSideFilters();
          }
        } else {
          alert("Operational Fetch Failed: " + data.message);
        }
      });
  }

  function renderSystemLeadsMatrixRows(leadsArray) {
    const tBody = document.getElementById("leadsMatrixTableBody");
    tBody.innerHTML = "";

    if(leadsArray.length === 0) {
      tBody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--text-light); padding:30px;">No operational profiles synced matching active filters.</td></tr>`;
      return;
    }

    leadsArray.forEach(lead => {
      let tr = document.createElement("tr");
      let categoryBadgeClass = "badge-cold";
      if(lead.category.includes("HOT")) categoryBadgeClass = "badge-hot";
      if(lead.category.includes("WARM")) categoryBadgeClass = "badge-warm";

      tr.innerHTML = `
        <td>
          <strong style="font-size:14.5px;">${lead.full_name}</strong><br>
          <span style="font-size:12px; color:var(--text-light);">${lead.phone} | ${lead.city}</span>
        </td>
        <td><span style="font-size:13px; font-weight:600;">${lead.qualification}</span></td>
        <td><span style="font-size:12.5px; color:var(--text-light);">${lead.source}</span></td>
        <td><span style="font-size:13px; color:var(--primary-deep); font-weight:700;">${lead.course_interest}</span></td>
        <td><strong style="font-size:16px;">${lead.ai_score} / 100</strong></td>
        <td><span class="badge-tag ${categoryBadgeClass}">${lead.category}</span></td>
        <td>
          <button class="btn-action-trigger" onclick="triggerAiPersonalizationConsole('${lead.full_name}', '${lead.course_interest}', '${lead.city}')">Nurture AI 💬</button>
        </td>
      `;
      tBody.appendChild(tr);
    });
  }

  function executeClientSideFilters() {
    const searchVal = document.getElementById("matrixSearchInput").value.trim().toLowerCase();
    const catSelector = document.getElementById("matrixCategorySelector").value;

    let filtered = activeSystemLeadsCollection.filter(lead => {
      let matchesSearch = lead.full_name.toLowerCase().includes(searchVal) || 
                          lead.qualification.toLowerCase().includes(searchVal) ||
                          lead.city.toLowerCase().includes(searchVal);
                          
      let matchesCat = true;
      if(catSelector === 'HOT') matchesCat = lead.category.includes("HOT");
      if(catSelector === 'WARM') matchesCat = lead.category.includes("WARM");
      if(catSelector === 'COLD') matchesCat = lead.category.includes("COLD");

      return matchesSearch && matchesCat;
    });

    renderSystemLeadsMatrixRows(filtered);
  }

  function triggerAiPersonalizationConsole(name, interest, city) {
    fetch('/api/admin/generate-message', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, interest, city })
    })
    .then(res => res.json())
    .then(data => {
      if(data.success) {
        document.getElementById("aiMessageTextAreaContainer").value = data.message;
        document.getElementById("aiMessagingModalBox").classList.add("active");
      }
    });
  }

  function closeMessagingConsole() {
    document.getElementById("aiMessagingModalBox").classList.remove("active");
  }

  function dispatchAutomatedNurtureSequence() {
    alert("Day 1 Automated Welcome Pipeline Matrix Active! Text payload successfully dispatched to live workflow integration nodes.");
    closeMessagingConsole();
  }

  window.addEventListener("DOMContentLoaded", fetchSystemLeadsTelemetry);
</script>
</body>
</html>
